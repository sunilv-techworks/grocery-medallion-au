[project]
name = "grocery-gen"
version = "0.1.0"
description = "Synthetic Australian grocery data generator"
requires-python = ">=3.11,<3.12"
dependencies = [
    "pandas>=2.2",
    "pyarrow>=16.0",
    "faker>=26.0",
    "holidays>=0.55",
    "pydantic>=2.8",
    "pydantic-settings>=2.4",
    "typer>=0.12",
    "rich>=13.0",
    "great-expectations>=1.0",
    "numpy>=1.26",
]

[project.scripts]
grocery-gen = "grocery_gen.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/grocery_gen"]
